<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>
                <i class="fas fa-temperature-three-quarters"></i>
                Temperature Converter
            </h1>

            <p class="subtitle">
                Convert temperature between Celsius, Fahrenheit & Kelvin
            </p>

            <!-- Temperature Input -->

            <div class="input-group">

                <label for="temperature">
                    Enter Temperature
                </label>

                <input
                    type="number"
                    id="temperature"
                    placeholder="Enter temperature">

            </div>

            <!-- Unit Selection -->

            <div class="input-group">

                <label for="unit">
                    Select Unit
                </label>

                <select id="unit">

                    <option value="celsius">
                        Celsius (°C)
                    </option>

                    <option value="fahrenheit">
                        Fahrenheit (°F)
                    </option>

                    <option value="kelvin">
                        Kelvin (K)
                    </option>

                </select>

            </div>

            <!-- Convert Button -->

            <button id="convertBtn">

                <i class="fas fa-sync-alt"></i>

                Convert

            </button>

            <!-- Error Message -->

            <p id="error" class="error"></p>

            <!-- Results -->

            <div class="result-box">

                <h2>Converted Values</h2>

                <div class="result-item">

                    <span>Celsius</span>

                    <strong id="celsiusResult">-- °C</strong>

                </div>

                <div class="result-item">

                    <span>Fahrenheit</span>

                    <strong id="fahrenheitResult">-- °F</strong>

                </div>

                <div class="result-item">

                    <span>Kelvin</span>

                    <strong id="kelvinResult">-- K</strong>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
